# Activate with:
#   --spring.profiles.active=dm8
#
# This profile configures the Spring Boot starter sample to connect to DM8.
# Flowable will auto-detect DM8 and route it through its Oracle-compatible SQL path.

spring.datasource.driver-class-name=dm.jdbc.driver.DmDriver
spring.datasource.url=jdbc:dm://127.0.0.1:5236?schema=FLOWABLE
spring.datasource.username=FLOWABLE
spring.datasource.password=FLOWABLE

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-test-query=select 1;

# Let Flowable create or upgrade the schema automatically during local setup.
flowable.database-schema-update=true
flowable.database-schema=FLOWABLE

# Keep the sample behavior aligned with the default starter sample.
flowable.cmmn.async.executor.default-async-job-acquire-wait-time=PT1S
flowable.process.async.executor.default-async-job-acquire-wait-time=PT1S

# If you are using an older DM JDBC driver, you can switch the URL to:
# spring.datasource.url=jdbc:dm://127.0.0.1:5236?schema=FLOWABLE&comOra=true
